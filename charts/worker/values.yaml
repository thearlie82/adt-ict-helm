replicaCount: 1
image:
  repository: ghcr.io/thearlie82/adt-ict-api
  tag: latest
  pullPolicy: Always
command:
  - celery
  - -A
  - app.tasks.celery_app
  - worker
  - --loglevel=info
  - --concurrency=2
env: {}
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
